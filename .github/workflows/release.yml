      #   shell: bash

      # - name: "Test Installed CCF"
      #   if: "${{ matrix.platform.name == 'virtual' }}"
      #   run: |
      #     set -ex
      #     set -o pipefail
      #     cd build
      #     cat /tmp/install_prefix | xargs -i bash -c "PYTHON_PACKAGE_PATH=../python ./test_install.sh {}"
      #   shell: bash

      # - name: "Recovery Benchmark for Installed CCF"
